
[env]
TERM = "xterm-256color"

[cursor]
blink_interval = 600
blink_timeout = 0
thickness = 0.3
unfocused_hollow = false

[cursor.style]
blinking = "Always"
shape = "Block"

[font]
size = 11

[font.normal]
family = "0xProto Nerd Font"
style = "Regular"

[font.bold]
family = "0xProto Nerd Font"
style = "Bold"

[font.italic]
family = "0xProto Nerd Font"
style = "Italic"

[font.bold_italic]
family = "0xProto Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

[window]
opacity = 1.0
title = "Terminal"

[window.dimensions]
columns = 130
lines = 45

[window.padding]
x = 4
y = 0

[general]
import = [
  # Theme - Catppuccin
  # uncomment the flavour you want below:
  # "~/.config/alacritty/themes/catppucci-latte.toml"
  # "~/.config/alacritty/themes/catppuccin-frappe.toml"
  # "~/.config/alacritty/themes/catppuccin-macchiato.toml"
  "~/.config/alacritty/themes/catppuccin-mocha.toml"
]

