set -g default-terminal "screen-256color"

set -g status-bg colour25
set -g status-fg colour255
set -g message-style 'fg=colour255 bg=colour53'

# default window title colors
set -g window-status-style 'fg=colour250 bg=default'

# Start numbering windows at 1 instead of 0
set -g base-index 1

# active window title colors
set -g window-status-current-style 'fg=colour255 bg=default'

# Set bind key to reload configuration file
bind r source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# panes
set -g pane-border-style 'fg=colour1 bg=colour0'
set -g pane-active-border-style 'bg=colour0 fg=colour10'

# Set different background color for active window
# set -g window-status-current-bg cyan

# Enable mouse mode (tmux 2.1 and above)
set -g mouse off
bind e set -g mouse \; display "Mouse is #{?mouse,enabled,disabled}"

# Enable vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Enable also copying to the system Clipboard
#bind -T vi-copy y copy-pipe "xclip -sel clip -i"
#set-option -s set-clipboard off
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
set -g set-clipboard on
set -g allow-passthrough on

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

