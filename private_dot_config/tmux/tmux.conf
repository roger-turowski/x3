set -g default-terminal "screen-256color"

set -g status-bg colour25
set -g status-fg colour255
set -g message-style 'fg=colour255 bg=colour53'

# default window title colors
set -g window-status-style 'fg=colour250 bg=default'

# Start numbering windows at 1 instead of 0
set -g base-index 1

# active window title colors
set -g window-status-current-style 'fg=colour255 bg=default'

# Set bind key to reload configuration file
bind r source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# panes
set -g pane-border-style 'fg=colour1 bg=colour0'
set -g pane-active-border-style 'bg=colour0 fg=colour10'

# Set different background color for active window
# set -g window-status-current-bg cyan

# Enable mouse mode (tmux 2.1 and above)
set -g mouse off
bind e set -g mouse \; display "Mouse is #{?mouse,enabled,disabled}"

# Enable vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Enable also copying to the system Clipboard
#bind -T vi-copy y copy-pipe "xclip -sel clip -i"
#set-option -s set-clipboard off
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
set -g set-clipboard on
set -g allow-passthrough on

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g status-right "#[fg=cyan,bold]#[sh-ip] #(hostname -I | awk '{print $1}')"
set -g status-interval 5

# Written by Lumo
# Basic settings
set -g status-justify left
set -g status-position top
set -g status-interval 30

# Color scheme (dark-friendly for terminal work)
set -g status-bg colour236
set -g status-fg colour252

# Left side: Session, hostname, windows
set -g status-left-length 40
#set -g status-left "[#S] #H #[default]"
set -g status-left "[#S] #[fg=colour14] #H"

# Window format
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold,bg=colour236,fg=colour256] #I:#W #[default]"

# Right side: Time, IP, system info
set -g status-right-length 80
set -g status-right "#[fg=colour251]#[bg=colour236] %Y-%m-%d %H:%M #[fg=colour255]| #[fg=colour39]#(hostname -I 2>/dev/null | awk '{print $1}') #[fg=colour255]| #[fg=colour220]#(uptime | sed 's/.*up //' | sed 's/,.*load.*$//')"

# Mouse support (optional - good for navigating sessions)
set -g mouse on

# History limit (more scrollback for log review)
set -g history-limit 10000

# Base index starting at 1 (some people prefer this)
set -g base-index 1
setw -g pane-base-index 1

# Escape time (prevents accidental Ctrl-a bindings)
set -sg escape-time 50

# Switch sessions with fzf
bind s run-shell "tmux list-sessions | fzf --reverse | awk -F: '{print $1}' | xargs tmux switch-client -t"

# Switch windows with fzf
bind w run-shell "tmux list-windows -a | fzf --reverse | awk -F: '{print $1\":\"$2}' | xargs tmux select-window -t"

# Kill panes with fzf
bind X run-shell "tmux list-panes -a -F '#{session_name}:#{window_index}.#{pane_index} #{pane_current_command}' | fzf --reverse | awk '{print $1}' | xargs tmux kill-pane -t"
